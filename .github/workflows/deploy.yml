name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch (code changes)
  push:
    branches: [main]

  # Scheduled rebuild every 2 hours — safety net so content is never stale
  schedule:
    - cron: '0 */2 * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

  # Triggered by Strapi webhook via Pipedream bridge (real-time content updates)
  repository_dispatch:
    types: [strapi-content-update]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        run: npm run build
        env:
          STRAPI_URL:   ${{ secrets.STRAPI_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
